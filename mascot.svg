<?xml version="1.0" encoding="utf-8"?>
<!--
  PyLingo mascot.
  Two interlocked snakes inspired by the Python language logo,
  rendered in PyLingo's brand green + gold. Pure geometry, so the
  mark stays crisp at every size on every device.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <g fill="none" stroke-width="20" stroke-linecap="round" stroke-linejoin="round">
    <path stroke="#58cc02" d="M 28 88 V 28 H 88"/>
    <path stroke="#ffc800" d="M 100 40 V 100 H 40"/>
  </g>
  <circle cx="88" cy="28" r="3" fill="#ffc800"/>
  <circle cx="40" cy="100" r="3" fill="#58cc02"/>
</svg>
